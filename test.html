<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Моя Игротека</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #0f172a; --card-bg: #1e293b; --accent: #6366f1; --started: #eab308; --success: #22c55e; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        .genre-section { background: rgba(30, 41, 59, 0.5); padding: 20px; border-radius: 16px; margin-bottom: 25px; }
        .series-container { margin-bottom: 20px; border-left: 3px solid var(--accent); padding-left: 15px; }
        .series-title { color: #94a3b8; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 10px; font-weight: bold; }
        .game-card { display: flex; align-items: center; padding: 8px; border-radius: 8px; margin-bottom: 6px; background: var(--card-bg); }
        .game-poster { width: 40px; height: 55px; border-radius: 4px; object-fit: cover; margin-right: 12px; background: #334155; }
        .status-btn { margin-left: auto; border: none; background: none; cursor: pointer; color: #64748b; }
        .started { color: var(--started); }
        .done { color: var(--success); }
        .disabled { opacity: 0.2; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Моя Игротека</h1>
        <div id="tracker"></div>
    </div>

    <script>
        const games = [
            // Пример структуры:
            { name: "Metro 2033", series: "Metro", genre: "Action", order: 1, status: 'start', poster: "https://upload.wikimedia.org/wikipedia/en/2/20/Metro_2033_cover.jpg" },
            { name: "Metro: Last Light", series: "Metro", genre: "Action", order: 2, status: 'start', poster: "https://upload.wikimedia.org/wikipedia/en/f/f0/Metro_Last_Light_cover.jpg" },
            { name: "The Witcher", series: "Witcher", genre: "RPG", order: 1, status: 'start', poster: "https://upload.wikimedia.org/wikipedia/en/0/0c/The_Witcher_cover.jpg" },
            { name: "The Witcher 2", series: "Witcher", genre: "RPG", order: 2, status: 'start', poster: "https://upload.wikimedia.org/wikipedia/en/d/d7/Witcher_2_cover.jpg" }
        ];

        function render() {
            const tracker = document.getElementById('tracker');
            tracker.innerHTML = '';
            
            // 1. Группируем по жанрам
            const byGenre = games.reduce((acc, g) => { (acc[g.genre] = acc[g.genre] || []).push(g); return acc; }, {});

            for (const genre in byGenre) {
                let section = document.createElement('div');
                section.className = 'genre-section';
                section.innerHTML = `<h2>${genre}</h2>`;
                
                // 2. Внутри жанра группируем по сериям
                const bySeries = byGenre[genre].reduce((acc, g) => { (acc[g.series] = acc[g.series] || []).push(g); return acc; }, {});
                
                for (const series in bySeries) {
                    let sDiv = document.createElement('div');
                    sDiv.className = 'series-container';
                    sDiv.innerHTML = `<div class="series-title">${series}</div>`;
                    
                    bySeries[series].forEach(game => {
                        const prevGame = games.find(g => g.series === game.series && g.order === game.order - 1);
                        const isUnlocked = game.order === 1 || (prevGame && prevGame.status === 'done');
                        
                        let card = document.createElement('div');
                        card.className = 'game-card';
                        card.innerHTML = `
                            <img src="${game.poster}" class="game-poster" onerror="this.style.display='none'">
                            <span>${game.name}</span>
                            <button class="status-btn ${game.status} ${!isUnlocked ? 'disabled' : ''}" 
                                    onclick="isUnlocked && nextStatus(${games.indexOf(game)})">
                                <i data-lucide="${game.status === 'start' ? 'circle' : game.status === 'started' ? 'clock' : 'check-circle-2'}"></i>
                            </button>
                        `;
                        sDiv.appendChild(card);
                    });
                    section.appendChild(sDiv);
                }
                tracker.appendChild(section);
            }
            lucide.createIcons();
        }

        function nextStatus(index) {
            const statuses = ['start', 'started', 'done'];
            let current = statuses.indexOf(games[index].status);
            games[index].status = statuses[(current + 1) % 3];
            render();
        }
        render();
    </script>
</body>
</html>
